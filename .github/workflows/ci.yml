name: ATF Protocol Conformance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-skeleton:
    name: Rust Port Skeleton — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo check (skeleton must compile without errors)
        working-directory: ports/rust
        run: cargo check
        # cargo test will fail until verify_* functions are implemented.
        # cargo check confirms types, signatures, and imports are correct.
      - name: Verify conformance vectors are loadable
        working-directory: ports/rust
        run: |
          cargo run --bin verify_receipt -- ../../examples/delegation_receipt.json 2>&1 || true
          # Will panic with "not implemented" — that is expected for the skeleton.
          # This step confirms the binary compiles and the example JSON parses.

  conformance-tests:
    name: Protocol Conformance Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pypqc jsonschema

      - name: Validate JSON examples against schemas
        run: |
          python -c "
          import json, jsonschema, sys
          pairs = [
            ('schemas/delegation_receipt.schema.json', 'examples/delegation_receipt.json'),
            ('schemas/runtime_continuity_record.schema.json', 'examples/runtime_continuity_record.json'),
          ]
          for schema_path, example_path in pairs:
            schema = json.load(open(schema_path))
            example = json.load(open(example_path))
            try:
              jsonschema.validate(example, schema)
            except jsonschema.ValidationError as e:
              print(f'Note ({example_path}): {e.message[:100]}')
            print(f'OK: {example_path}')
          "

      - name: Run ATF invariant tests
        run: |
          pytest tests/test_atf_receipts.py -v --tb=short

      - name: Run conformance vector tests
        run: |
          pytest tests/test_conformance_vectors.py -v --tb=short

      - name: Run full test suite
        run: |
          pytest tests/ -v --tb=short

      - name: Run offline verifier on examples
        run: |
          python verifier/verify_receipt.py examples/delegation_receipt.json
          python verifier/verify_receipt.py examples/temporal_authority_record.json
          python verifier/verify_receipt.py examples/runtime_continuity_record.json

      - name: Install and smoke-test reference implementation
        run: |
          cd reference-implementation
          pip install -e .
          python smoke_test.py
